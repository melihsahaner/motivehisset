<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MotiveHisset - Motivasyon Video Oluşturucu</title>
  <meta name="description"
    content="Ücretsiz telifsiz doğa videoları üzerine motivasyon sözleri ekleyerek dikey formatta videolar oluşturun." />
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,700;1,400;1,500;1,700&family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;700&display=swap"
    rel="stylesheet" crossorigin />
</head>

<body>
  <div id="app">
    <!-- Background Video -->
    <div class="bg-video-container">
      <video id="bg-video" muted playsinline loop></video>
    </div>

    <!-- API Key Modal -->
    <div id="api-key-modal" class="modal-overlay">
      <div class="modal-card">
        <div class="modal-icon">🔑</div>
        <h2>Pexels API Anahtarı</h2>
        <p>Ücretsiz telifsiz videolar için Pexels API anahtarı gerekli.<br />
          <a href="https://www.pexels.com/api/" target="_blank" rel="noopener">pexels.com/api</a> adresinden ücretsiz
          alabilirsiniz.
        </p>
        <input type="text" id="api-key-input" placeholder="API anahtarınızı girin..." autocomplete="off" />
        <button id="api-key-submit" class="btn btn-primary btn-full">Başla</button>
      </div>
    </div>

    <!-- Main App -->
    <div id="main-app" class="hidden">
      <header>
        <div class="header-content">
          <div class="logo">
            <h1>MotiveHisset</h1>
          </div>
          <p class="subtitle">Motivasyon Video Oluşturucu</p>
        </div>
      </header>

      <main>
        <!-- Video Preview -->
        <div class="preview-container">
          <div class="phone-frame">
            <div id="video-wrapper" class="video-wrapper">
              <video id="video-player" muted playsinline></video>
              <!-- Branding Overlays -->
              <div class="brand-top">MOTİVE HİSSET</div>
              <div class="brand-bottom">
                <span class="brand-left">@motivehisset</span>
                <span class="brand-right">motivehisset.com</span>
              </div>
              <div id="quote-overlay" class="quote-overlay">
                <p id="quote-text"></p>
              </div>
              <!-- Outro Overlay -->
              <div id="outro-overlay" class="outro-overlay hidden">
                <img src="/Motive-Hisset-Logo.png" alt="MotiveHisset" class="outro-logo" />
              </div>
              <!-- Loading State -->
              <div id="video-loading" class="video-loading">
                <div class="spinner"></div>
                <span>Video yükleniyor...</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Controls -->
        <div class="controls">
          <!-- Text Customization Section -->
          <div class="settings-panel">
            <div class="settings-group">
              <label>Metni Düzenle</label>
              <textarea id="input-quote" placeholder="Sözünüzü buraya yazın..."></textarea>
            </div>

            <div class="settings-grid">
              <div class="settings-group">
                <label>Hizalama</label>
                <div class="align-buttons">
                  <button class="btn-align" data-align="left" title="Sola">左</button>
                  <button class="btn-align active" data-align="center" title="Ortala">中</button>
                  <button class="btn-align" data-align="right" title="Sağa">右</button>
                </div>
              </div>
              <div class="settings-group">
                <label>Metin Boyutu</label>
                <div class="range-container">
                  <input type="range" id="range-font-size" min="1.0" max="4.0" step="0.1" value="1.8">
                  <span id="val-font-size">1.8rem</span>
                </div>
              </div>
              <div class="settings-group">
                <label>Satır Aralığı</label>
                <div class="range-container">
                  <input type="range" id="range-line-height" min="1.0" max="2.0" step="0.05" value="1.1">
                  <span id="val-line-height">1.1</span>
                </div>
              </div>
            </div>
          </div>

          <div class="controls-row">
            <button id="btn-refresh" class="btn btn-glass" title="Yenile">
              <span class="btn-icon">🔄</span>
              <span>Yenile</span>
            </button>
            <button id="btn-change-quote" class="btn btn-glass" title="Söz Değiştir">
              <span class="btn-icon">✏️</span>
              <span>Söz Değiştir</span>
            </button>
            <button id="btn-change-video" class="btn btn-glass" title="Video Değiştir">
              <span class="btn-icon">🎬</span>
              <span>Video Değiştir</span>
            </button>
          </div>
          <button id="btn-download" class="btn btn-primary btn-full" title="İndir">
            <span class="btn-icon">⬇️</span>
            <span>Videoyu İndir</span>
          </button>
        </div>

        <!-- Download Progress -->
        <div id="download-progress" class="download-progress hidden">
          <div class="progress-bar">
            <div id="progress-fill" class="progress-fill"></div>
          </div>
          <p id="progress-text">Hazırlanıyor...</p>
        </div>
      </main>
    </div>
  </div>

  <!-- Hidden canvas for recording -->
  <canvas id="record-canvas" style="display:none;"></canvas>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
