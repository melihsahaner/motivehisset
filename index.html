<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MotiveHisset - Motivasyon Video Oluşturucu</title>
  <meta name="description"
    content="Ücretsiz telifsiz doğa videoları üzerine motivasyon sözleri ekleyerek dikey formatta videolar oluşturun." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;700&display=swap"
    rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.cdnfonts.com" />
  <link href="https://fonts.cdnfonts.com/css/tex-gyre-schola" rel="stylesheet" />
</head>

<body>
  <div id="app">
    <!-- API Key Modal -->
    <div id="api-key-modal" class="modal-overlay">
      <div class="modal-card">
        <div class="modal-icon">🔑</div>
        <h2>Pexels API Anahtarı</h2>
        <p>Ücretsiz telifsiz videolar için Pexels API anahtarı gerekli.<br />
          <a href="https://www.pexels.com/api/" target="_blank" rel="noopener">pexels.com/api</a> adresinden ücretsiz
          alabilirsiniz.
        </p>
        <input type="text" id="api-key-input" placeholder="API anahtarınızı girin..." autocomplete="off" />
        <button id="api-key-submit" class="btn btn-primary btn-full">Başla</button>
      </div>
    </div>

    <!-- Main App -->
    <div id="main-app" class="hidden">
      <header>
        <div class="logo">
          <span class="logo-icon">🎬</span>
          <h1>MotiveHisset</h1>
        </div>
        <p class="subtitle">Motivasyon Video Oluşturucu</p>
      </header>

      <main>
        <!-- Video Preview -->
        <div class="preview-container">
          <div class="phone-frame">
            <div id="video-wrapper" class="video-wrapper">
              <video id="video-player" muted playsinline></video>
              <!-- Branding Overlays -->
              <div class="brand-top">MOTİVE HİSSET</div>
              <div class="brand-bottom">
                <span class="brand-left">@motivehisset</span>
                <span class="brand-right">motivehisset.com</span>
              </div>
              <div id="quote-overlay" class="quote-overlay">
                <p id="quote-text"></p>
              </div>
              <!-- Outro Overlay -->
              <div id="outro-overlay" class="outro-overlay hidden">
                <img src="/Motive-Hisset-Logo.png" alt="MotiveHisset" class="outro-logo" />
              </div>
              <!-- Loading State -->
              <div id="video-loading" class="video-loading">
                <div class="spinner"></div>
                <span>Video yükleniyor...</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Controls -->
        <div class="controls">
          <div class="controls-row">
            <button id="btn-refresh" class="btn btn-glass" title="Yenile">
              <span class="btn-icon">🔄</span>
              <span>Yenile</span>
            </button>
            <button id="btn-change-quote" class="btn btn-glass" title="Söz Değiştir">
              <span class="btn-icon">✏️</span>
              <span>Söz Değiştir</span>
            </button>
            <button id="btn-change-video" class="btn btn-glass" title="Video Değiştir">
              <span class="btn-icon">🎬</span>
              <span>Video Değiştir</span>
            </button>
          </div>
          <button id="btn-download" class="btn btn-primary btn-full" title="İndir">
            <span class="btn-icon">⬇️</span>
            <span>Videoyu İndir</span>
          </button>
        </div>

        <!-- Download Progress -->
        <div id="download-progress" class="download-progress hidden">
          <div class="progress-bar">
            <div id="progress-fill" class="progress-fill"></div>
          </div>
          <p id="progress-text">Hazırlanıyor...</p>
        </div>
      </main>
    </div>
  </div>

  <!-- Hidden canvas for recording -->
  <canvas id="record-canvas" style="display:none;"></canvas>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
